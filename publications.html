<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications - Issam Sayyaf</title>
    <meta name="description" content="Research papers, conference proceedings, and academic contributions by Issam Sayyaf.">
    <link rel="icon" type="image/png" href="assets/images/icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>

<div class="aurora">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<header class="site-header">
    <div class="header-inner">
        <a href="index.html" class="site-logo">Issam Sayyaf</a>
        <button class="nav-toggle" aria-label="Toggle navigation"><i class="fas fa-bars"></i></button>
        <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="publications.html" class="active">Publications</a>
            <a href="blog.html">Blog</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="cv.html">CV</a>
        </nav>
    </div>
</header>

<main>
    <section class="page-header">
        <div class="container">
            <div class="overline" style="justify-content:center"><i class="fas fa-flask"></i> Research Output</div>
            <h1>Publications <span class="gradient-text">& Papers</span></h1>
            <p class="subtitle">Research papers, conference proceedings, and academic contributions</p>
        </div>
    </section>

    <div class="container">
        <div class="holo-grid holo-grid-page reveal" id="pub-container"></div>
        <div id="pub-details-container"></div>
    </div>
</main>

<footer class="site-footer">
    <div class="container"><div class="footer-inner">
        <p>&copy; 2025 Issam Sayyaf. All rights reserved.</p>
        <div class="footer-links">
            <a href="index.html">Home</a><a href="projects.html">Projects</a>
            <a href="blog.html">Blog</a><a href="contact.html">Contact</a>
        </div>
    </div></div>
</footer>

<script src="assets/js/main.js"></script>
<script>
class PubLoader {
    constructor() { this.data = null; this.init(); }

    async init() {
        try {
            const res = await fetch('publications/publications-data.json');
            this.data = await res.json();
            this.renderCards();
            this.setupModals();
        } catch (e) { console.error(e); }
    }

    renderCards() {
        const el = document.getElementById('pub-container');
        const sorted = this.data.publications.sort((a, b) => a.order - b.order);
        el.innerHTML = sorted.map((p, i) => {
            const num = String(i + 1).padStart(3, '0');
            return `<div class="holo-card" onclick="togglePub('${p.id}')" style="cursor:pointer">
                <div class="holo-card-bg"><img src="${p.image}" alt="${p.title}" onerror="this.src='assets/images/background.png'"></div>
                <div class="holo-scanline"></div>
                <div class="holo-card-content">
                    <div class="holo-top">
                        <span class="holo-id">PUB-${num}</span>
                        <div style="display:flex;gap:4px;align-items:center">
                            <span class="badge badge-primary">${p.type}</span>
                            <a href="${p.link}" target="_blank" class="holo-link" onclick="event.stopPropagation()"><i class="fas fa-external-link-alt"></i></a>
                        </div>
                    </div>
                    <div class="holo-bottom">
                        <h3>${p.title}</h3>
                        <p>${p.abstract}</p>
                        <div class="holo-date">
                            <i class="fas fa-calendar"></i> ${p.date}
                            <span style="margin-left:8px"><i class="fas fa-map-marker-alt"></i> ${p.venue}</span>
                        </div>
                    </div>
                    <div class="holo-corner holo-corner-tl"></div>
                    <div class="holo-corner holo-corner-tr"></div>
                    <div class="holo-corner holo-corner-bl"></div>
                    <div class="holo-corner holo-corner-br"></div>
                </div>
            </div>`;
        }).join('');
    }

    async setupModals() {
        // Create shared overlay
        if (!document.getElementById('detail-overlay')) {
            const overlay = document.createElement('div');
            overlay.id = 'detail-overlay';
            overlay.className = 'detail-overlay';
            overlay.addEventListener('click', () => closePub());
            document.body.appendChild(overlay);
        }

        const el = document.getElementById('pub-details-container');
        const sorted = this.data.publications.sort((a, b) => a.order - b.order);
        let html = '';
        for (let i = 0; i < sorted.length; i++) {
            const p = sorted[i];
            const prev = sorted[i - 1];
            const next = sorted[i + 1];
            let content;
            try {
                const res = await fetch(p.detailsFile);
                const md = await res.text();
                content = typeof marked !== 'undefined' ? marked.parse(md) : md;
            } catch { content = '<p>Details not available.</p>'; }

            const num = String(i + 1).padStart(3, '0');
            html += `<div id="${p.id}-details" class="detail-panel">
                <div class="detail-header">
                    <div class="detail-header-left">
                        <span class="holo-id">PUB-${num}</span>
                        <span class="detail-title-sm">${p.title}</span>
                    </div>
                    <button class="detail-close" onclick="closePub()" aria-label="Close"><i class="fas fa-times"></i></button>
                </div>
                <div class="detail-hero">
                    <img src="${p.image}" alt="${p.title}" onerror="this.src='assets/images/background.png'">
                    <div class="hud-corner hud-tl"></div>
                    <div class="hud-corner hud-tr"></div>
                    <div class="hud-corner hud-bl"></div>
                    <div class="hud-corner hud-br"></div>
                </div>
                <div class="detail-meta-bar">
                    <span class="badge badge-primary">${p.type}</span>
                    <span class="badge badge-accent">${p.date}</span>
                    <span class="badge badge-outline">${p.venue}</span>
                </div>
                <div class="detail-body">
                    <p style="font-size:0.75rem;color:var(--text-3);margin-bottom:16px"><i class="fas fa-users" style="margin-right:6px;color:var(--accent)"></i>${p.authors}</p>
                    ${content}
                </div>
                <div class="detail-footer">
                    <div class="detail-nav">
                        ${prev ? `<button onclick="navigatePub('${prev.id}')"><i class="fas fa-chevron-left"></i> Prev</button>` : ''}
                        ${next ? `<button onclick="navigatePub('${next.id}')">Next <i class="fas fa-chevron-right"></i></button>` : ''}
                    </div>
                    <div style="display:flex;gap:6px">
                        <a href="${p.link}" target="_blank" class="btn btn-secondary btn-sm" onclick="event.stopPropagation()"><i class="fas fa-external-link-alt"></i> Paper</a>
                        <button class="btn btn-primary btn-sm" onclick="closePub()"><i class="fas fa-times"></i> Close</button>
                    </div>
                </div>
            </div>`;
        }
        el.innerHTML = html;
    }
}

function togglePub(id) {
    const overlay = document.getElementById('detail-overlay');
    document.querySelectorAll('.detail-panel').forEach(d => d.classList.remove('open'));
    const el = document.getElementById(id + '-details');
    el.classList.add('open');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closePub() {
    document.querySelectorAll('.detail-panel').forEach(d => d.classList.remove('open'));
    const overlay = document.getElementById('detail-overlay');
    if (overlay) overlay.classList.remove('open');
    document.body.style.overflow = '';
}

function navigatePub(id) {
    document.querySelectorAll('.detail-panel').forEach(d => d.classList.remove('open'));
    const el = document.getElementById(id + '-details');
    if (el) el.classList.add('open');
}

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePub(); });

new PubLoader();
</script>
</body>
</html>
