<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Issam Sayyaf</title>
    <meta name="description" content="Articles on embedded systems, deep learning, signal processing, and software development.">
    <link rel="icon" type="image/png" href="assets/images/icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>

<div class="aurora">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<header class="site-header">
    <div class="header-inner">
        <a href="index.html" class="site-logo">Issam Sayyaf</a>
        <button class="nav-toggle" aria-label="Toggle navigation"><i class="fas fa-bars"></i></button>
        <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="publications.html">Publications</a>
            <a href="blog.html" class="active">Blog</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="cv.html">CV</a>
        </nav>
    </div>
</header>

<main>
    <section class="page-header">
        <div class="container">
            <div class="overline" style="justify-content:center"><i class="fas fa-satellite"></i> Transmissions</div>
            <h1>Blog <span class="gradient-text">Posts</span></h1>
            <p class="subtitle">Insights and tutorials on embedded systems, deep learning, and signal processing</p>
            <div class="page-stats" id="pageStats"></div>
        </div>
    </section>

    <div class="container">
        <div class="cat-pills reveal" id="categoryGrid"></div>

        <div class="filters-bar reveal">
            <div class="search-field">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search articles...">
            </div>
            <select class="select-field" id="categoryFilter"><option value="">All Categories</option></select>
            <select class="select-field" id="sortBy">
                <option value="date-desc">Latest First</option>
                <option value="date-asc">Oldest First</option>
                <option value="title">Title A-Z</option>
            </select>
        </div>

        <div class="holo-grid holo-grid-page reveal" id="postsGrid"></div>
        <div class="empty-state" id="noResults" style="display:none">
            <i class="fas fa-satellite-dish"></i>
            <h3>No signal detected</h3>
            <p>Try adjusting your search or filters</p>
        </div>

        <div class="load-more">
            <button id="loadMoreBtn" class="btn btn-secondary" style="display:none"><i class="fas fa-plus"></i> Load More</button>
        </div>

        <div id="blog-details-container"></div>
    </div>
</main>

<footer class="site-footer">
    <div class="container"><div class="footer-inner">
        <p>&copy; 2025 Issam Sayyaf. All rights reserved.</p>
        <div class="footer-links">
            <a href="index.html">Home</a><a href="projects.html">Projects</a>
            <a href="blog.html">Blog</a><a href="contact.html">Contact</a>
        </div>
    </div></div>
</footer>

<script src="assets/js/main.js"></script>
<script>
class BlogManager {
    constructor() { this.data = null; this.filtered = []; this.page = 1; this.perPage = 6; this.curCat = ''; this.init(); }

    async init() {
        try {
            const res = await fetch('blog/blog-data.json');
            this.data = await res.json();
            this.filtered = [...this.data.posts];
            this.sort('date-desc');
            this.checkURL();
            this.listen();
            this.populateFilters();
            this.renderCats();
            this.renderStats();
            this.renderPosts();
            this.setupModals();
        } catch (e) { console.error(e); }
    }

    checkURL() {
        const slug = new URLSearchParams(location.search).get('category');
        if (slug) {
            const cat = this.data.categories.find(c => c.slug === slug);
            if (cat) { this.curCat = cat.name; this.filterCat(cat.name); document.getElementById('categoryFilter').value = cat.name; }
        }
    }

    listen() {
        document.getElementById('searchInput')?.addEventListener('input', e => this.search(e.target.value));
        document.getElementById('categoryFilter')?.addEventListener('change', e => {
            this.filterCat(e.target.value);
            const cat = this.data.categories.find(c => c.name === e.target.value);
            history.pushState({}, '', cat ? `?category=${cat.slug}` : location.pathname);
        });
        document.getElementById('sortBy')?.addEventListener('change', e => { this.sort(e.target.value); this.renderPosts(); });
        document.getElementById('loadMoreBtn')?.addEventListener('click', () => { this.page++; this.renderPosts(); });
    }

    populateFilters() {
        const sel = document.getElementById('categoryFilter');
        this.data.categories.forEach(c => { sel.innerHTML += `<option value="${c.name}">${c.name}</option>`; });
    }

    renderStats() {
        const el = document.getElementById('pageStats');
        const total = this.data.posts.length;
        const cats = this.data.categories.length;
        el.innerHTML = `
            <span class="page-stat"><span class="page-stat-num">${total}</span> articles</span>
            <span class="page-stat-sep">/</span>
            <span class="page-stat"><span class="page-stat-num">${cats}</span> topics</span>
        `;
    }

    renderCats() {
        const grid = document.getElementById('categoryGrid');
        grid.innerHTML = this.data.categories.map(c => {
            const n = this.data.posts.filter(p => p.category === c.name).length;
            return `<button class="cat-pill" onclick="location.href='blog.html?category=${c.slug}'">
                <i class="${c.icon}"></i> ${c.name} <span class="cat-pill-count">${n}</span>
            </button>`;
        }).join('');
    }

    search(term) {
        const s = term.toLowerCase().trim();
        const base = this.curCat ? this.data.posts.filter(p => p.category === this.curCat) : this.data.posts;
        this.filtered = s ? base.filter(p =>
            p.title.toLowerCase().includes(s) || p.excerpt.toLowerCase().includes(s) ||
            p.tags.some(t => t.toLowerCase().includes(s))
        ) : [...base];
        this.page = 1; this.renderPosts();
    }

    filterCat(c) {
        this.curCat = c;
        this.filtered = c ? this.data.posts.filter(p => p.category === c) : [...this.data.posts];
        this.page = 1; this.renderPosts();
    }

    sort(by) {
        switch (by) {
            case 'date-desc': this.filtered.sort((a, b) => new Date(b.date) - new Date(a.date)); break;
            case 'date-asc': this.filtered.sort((a, b) => new Date(a.date) - new Date(b.date)); break;
            case 'title': this.filtered.sort((a, b) => a.title.localeCompare(b.title)); break;
        }
    }

    renderPosts() {
        const grid = document.getElementById('postsGrid');
        const btn = document.getElementById('loadMoreBtn');
        const empty = document.getElementById('noResults');
        if (!this.filtered.length) { grid.innerHTML = ''; empty.style.display = 'block'; btn.style.display = 'none'; return; }
        empty.style.display = 'none';
        const end = this.page * this.perPage;
        grid.innerHTML = this.filtered.slice(0, end).map((p, i) => this.holoCard(p, i)).join('');
        btn.style.display = end < this.filtered.length ? 'inline-flex' : 'none';
    }

    holoCard(post, i) {
        const date = new Date(post.date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        const tags = post.tags.slice(0, 3).map(t => `<span class="tech-badge">${t}</span>`).join('');
        const num = String(i + 1).padStart(3, '0');

        return `<div class="holo-card" onclick="openBlog('${post.id}')" style="cursor:pointer">
            <div class="holo-card-bg"><img src="${post.image}" alt="${post.title}" onerror="this.src='assets/images/background.png'"></div>
            <div class="holo-scanline"></div>
            <div class="holo-card-content">
                <div class="holo-top">
                    <span class="holo-id">LOG-${num}</span>
                    <span class="badge badge-primary">${post.category}</span>
                </div>
                <div class="holo-bottom">
                    <h3>${post.title}</h3>
                    <p>${post.excerpt}</p>
                    <div class="tags-list">${tags}</div>
                    <div class="holo-date"><i class="fas fa-calendar"></i> ${date} <span style="margin-left:8px"><i class="fas fa-clock"></i> ${post.readTime}</span></div>
                </div>
                <div class="holo-corner holo-corner-tl"></div>
                <div class="holo-corner holo-corner-tr"></div>
                <div class="holo-corner holo-corner-bl"></div>
                <div class="holo-corner holo-corner-br"></div>
            </div>
        </div>`;
    }

    async setupModals() {
        if (!document.getElementById('detail-overlay')) {
            const overlay = document.createElement('div');
            overlay.id = 'detail-overlay';
            overlay.className = 'detail-overlay';
            overlay.addEventListener('click', () => closeBlog());
            document.body.appendChild(overlay);
        }

        const container = document.getElementById('blog-details-container');
        const posts = this.data.posts;
        let html = '';
        for (let i = 0; i < posts.length; i++) {
            const p = posts[i];
            const prev = posts[i - 1];
            const next = posts[i + 1];
            const date = new Date(p.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            const tags = p.tags.map(t => `<span class="tech-badge">${t}</span>`).join('');
            const num = String(i + 1).padStart(3, '0');

            let content;
            try {
                const mdPath = p.path + 'index.md';
                const res = await fetch(mdPath);
                let md = await res.text();
                // Strip frontmatter
                md = md.replace(/^---[\s\S]*?---\s*/, '');
                content = typeof marked !== 'undefined' ? marked.parse(md) : md;
            } catch {
                content = `<h1>${p.title}</h1><p>${p.excerpt}</p>`;
            }

            html += `<div id="${p.id}-detail" class="detail-panel" data-index="${i}">
                <div class="detail-header">
                    <div class="detail-header-left">
                        <span class="holo-id">LOG-${num}</span>
                        <span class="detail-title-sm">${p.title}</span>
                    </div>
                    <button class="detail-close" onclick="closeBlog()" aria-label="Close"><i class="fas fa-times"></i></button>
                </div>
                <div class="detail-hero">
                    <img src="${p.image}" alt="${p.title}" onerror="this.src='assets/images/background.png'">
                    <div class="hud-corner hud-tl"></div>
                    <div class="hud-corner hud-tr"></div>
                    <div class="hud-corner hud-bl"></div>
                    <div class="hud-corner hud-br"></div>
                </div>
                <div class="detail-meta-bar">
                    <span class="badge badge-primary">${p.category}</span>
                    <span class="badge badge-outline">${date}</span>
                    <span class="badge badge-outline"><i class="fas fa-clock" style="margin-right:3px"></i> ${p.readTime}</span>
                    ${tags}
                </div>
                <div class="detail-body">
                    <div style="font-size:0.75rem;color:var(--text-3);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);font-family:var(--mono)">
                        <i class="fas fa-user" style="margin-right:6px;color:var(--accent)"></i>${p.author} &mdash; ${p.authorTitle}
                    </div>
                    ${content}
                </div>
                <div class="detail-footer">
                    <div class="detail-nav">
                        ${prev ? `<button onclick="openBlog('${prev.id}')"><i class="fas fa-chevron-left"></i> Prev</button>` : ''}
                        ${next ? `<button onclick="openBlog('${next.id}')">Next <i class="fas fa-chevron-right"></i></button>` : ''}
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="closeBlog()"><i class="fas fa-times"></i> Close</button>
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }
}

function openBlog(id) {
    const overlay = document.getElementById('detail-overlay');
    document.querySelectorAll('.detail-panel').forEach(d => d.classList.remove('open'));
    const el = document.getElementById(id + '-detail');
    if (el) {
        el.classList.add('open');
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
        el.querySelector('.detail-body')?.scrollTo(0, 0);
    }
}

function closeBlog() {
    document.querySelectorAll('.detail-panel').forEach(d => d.classList.remove('open'));
    const overlay = document.getElementById('detail-overlay');
    if (overlay) overlay.classList.remove('open');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeBlog(); });
document.addEventListener('DOMContentLoaded', () => new BlogManager());
</script>
</body>
</html>
