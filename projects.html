<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Issam Sayyaf</title>
    <meta name="description" content="Explore Issam Sayyaf's portfolio of embedded systems, IoT, deep learning, and signal processing projects.">
    <link rel="icon" type="image/png" href="assets/images/icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>

<div class="aurora">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<header class="site-header">
    <div class="header-inner">
        <a href="index.html" class="site-logo">Issam Sayyaf</a>
        <button class="nav-toggle" aria-label="Toggle navigation"><i class="fas fa-bars"></i></button>
        <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="projects.html" class="active">Projects</a>
            <a href="publications.html">Publications</a>
            <a href="blog.html">Blog</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="cv.html">CV</a>
        </nav>
    </div>
</header>

<main>
    <section class="page-header">
        <div class="container">
            <div class="overline" style="justify-content:center"><i class="fas fa-terminal"></i> System.projects</div>
            <h1>Projects <span class="gradient-text">Archive</span></h1>
            <p class="subtitle">Embedded systems, IoT, deep learning, and signal processing</p>
            <div class="page-stats" id="pageStats"></div>
        </div>
    </section>

    <div class="container">
        <div class="cat-pills reveal" id="categoryGrid"></div>

        <div class="filters-bar reveal">
            <div class="search-field">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search projects...">
            </div>
            <select class="select-field" id="categoryFilter"><option value="">All Categories</option></select>
            <select class="select-field" id="statusFilter">
                <option value="">All Status</option>
                <option value="completed">Completed</option>
                <option value="in-progress">In Progress</option>
                <option value="planned">Planned</option>
            </select>
        </div>

        <div class="holo-grid holo-grid-page reveal" id="projectsGrid"></div>
        <div class="empty-state" id="noResults" style="display:none">
            <i class="fas fa-satellite-dish"></i>
            <h3>No signal detected</h3>
            <p>Try adjusting your search or filters</p>
        </div>
        <div id="project-details-container"></div>
    </div>
</main>

<footer class="site-footer">
    <div class="container"><div class="footer-inner">
        <p>&copy; 2025 Issam Sayyaf. All rights reserved.</p>
        <div class="footer-links">
            <a href="index.html">Home</a><a href="projects.html">Projects</a>
            <a href="blog.html">Blog</a><a href="contact.html">Contact</a>
        </div>
    </div></div>
</footer>

<script src="assets/js/main.js"></script>
<script>
class ProjectsManager {
    constructor() { this.data = null; this.filtered = []; this.init(); }

    async init() {
        try {
            const res = await fetch('projects/projects-data.json');
            this.data = await res.json();
            this.filtered = [...this.data.projects];
            this.checkURL();
            this.listen();
            this.populateFilters();
            this.renderCats();
            this.renderStats();
            this.renderAll();
            this.setupModals();
        } catch (e) { console.error(e); }
    }

    checkURL() {
        const slug = new URLSearchParams(location.search).get('category');
        if (slug) {
            const cat = this.data.categories.find(c => c.slug === slug);
            if (cat) { this.filterCat(cat.name); document.getElementById('categoryFilter').value = cat.name; }
        }
    }

    listen() {
        document.getElementById('searchInput').addEventListener('input', e => this.search(e.target.value));
        document.getElementById('categoryFilter').addEventListener('change', e => this.filterCat(e.target.value));
        document.getElementById('statusFilter').addEventListener('change', e => this.filterStatus(e.target.value));
    }

    populateFilters() {
        const sel = document.getElementById('categoryFilter');
        this.data.categories.forEach(c => { sel.innerHTML += `<option value="${c.name}">${c.name}</option>`; });
    }

    renderStats() {
        const el = document.getElementById('pageStats');
        const total = this.data.projects.length;
        const done = this.data.projects.filter(p => p.status === 'completed').length;
        const cats = this.data.categories.length;
        el.innerHTML = `
            <span class="page-stat"><span class="page-stat-num">${total}</span> projects</span>
            <span class="page-stat-sep">/</span>
            <span class="page-stat"><span class="page-stat-num">${done}</span> completed</span>
            <span class="page-stat-sep">/</span>
            <span class="page-stat"><span class="page-stat-num">${cats}</span> domains</span>
        `;
    }

    renderCats() {
        document.getElementById('categoryGrid').innerHTML = this.data.categories.map(c => {
            const n = this.data.projects.filter(p => p.category === c.name).length;
            return `<button class="cat-pill" onclick="location.href='projects.html?category=${c.slug}'">
                <i class="${c.icon}"></i> ${c.name} <span class="cat-pill-count">${n}</span>
            </button>`;
        }).join('');
    }

    renderAll() {
        const grid = document.getElementById('projectsGrid');
        const empty = document.getElementById('noResults');
        if (!this.filtered.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
        empty.style.display = 'none';
        grid.innerHTML = this.filtered.map((p, i) => this.holoCard(p, i)).join('');
    }

    holoCard(p, i) {
        const s = this.data.statuses[p.status];
        const techs = p.technologies.slice(0, 4).map(t => `<span class="tech-badge">${t}</span>`).join('');
        let links = '';
        if (p.github) links += `<a href="${p.github}" onclick="event.stopPropagation()" target="_blank" class="holo-link"><i class="fab fa-github"></i></a>`;
        if (p.gitlab) links += `<a href="${p.gitlab}" onclick="event.stopPropagation()" target="_blank" class="holo-link"><i class="fab fa-gitlab"></i></a>`;
        if (p.demo) links += `<a href="${p.demo}" onclick="event.stopPropagation()" target="_blank" class="holo-link"><i class="fas fa-external-link-alt"></i></a>`;
        const num = String(i + 1).padStart(3, '0');

        return `<div class="holo-card" onclick="openProject('${p.id}')" style="cursor:pointer">
            <div class="holo-card-bg"><img src="${p.image}" alt="${p.title}" onerror="this.src='assets/images/background.png'"></div>
            <div class="holo-scanline"></div>
            <div class="holo-card-content">
                <div class="holo-top">
                    <span class="holo-id">PRJ-${num}</span>
                    <div style="display:flex;gap:4px;align-items:center">
                        <span class="badge badge-${p.status === 'completed' ? 'success' : 'warning'}">${s.label}</span>
                        ${links}
                    </div>
                </div>
                <div class="holo-bottom">
                    <span class="badge badge-primary" style="align-self:flex-start">${p.category}</span>
                    <h3>${p.title}</h3>
                    <p>${p.excerpt}</p>
                    <div class="tags-list">${techs}</div>
                    <div class="holo-date"><i class="fas fa-calendar"></i> ${this.fmtDate(p.date)}</div>
                </div>
                <div class="holo-corner holo-corner-tl"></div>
                <div class="holo-corner holo-corner-tr"></div>
                <div class="holo-corner holo-corner-bl"></div>
                <div class="holo-corner holo-corner-br"></div>
            </div>
        </div>`;
    }

    async setupModals() {
        if (!document.getElementById('detail-overlay')) {
            const overlay = document.createElement('div');
            overlay.id = 'detail-overlay';
            overlay.className = 'detail-overlay';
            overlay.addEventListener('click', () => closeProject());
            document.body.appendChild(overlay);
        }

        const container = document.getElementById('project-details-container');
        const all = this.data.projects;
        let html = '';
        for (let i = 0; i < all.length; i++) {
            const p = all[i];
            const prev = all[i - 1];
            const next = all[i + 1];
            const s = this.data.statuses[p.status];
            const techs = p.technologies.map(t => `<span class="tech-badge">${t}</span>`).join('');
            const num = String(i + 1).padStart(3, '0');

            let content;
            try {
                const res = await fetch(p.path + 'README.md');
                const md = await res.text();
                content = typeof marked !== 'undefined' ? marked.parse(md) : md;
            } catch { content = `<h1>${p.title}</h1><p>${p.description}</p>`; }

            let linkBtns = '';
            if (p.github) linkBtns += `<a href="${p.github}" target="_blank" class="btn btn-secondary btn-sm"><i class="fab fa-github"></i> GitHub</a>`;
            if (p.gitlab) linkBtns += `<a href="${p.gitlab}" target="_blank" class="btn btn-secondary btn-sm"><i class="fab fa-gitlab"></i> GitLab</a>`;
            if (p.demo) linkBtns += `<a href="${p.demo}" target="_blank" class="btn btn-secondary btn-sm"><i class="fas fa-external-link-alt"></i> Demo</a>`;

            html += `<div id="${p.id}-detail" class="detail-panel" data-index="${i}">
                <div class="detail-header">
                    <div class="detail-header-left">
                        <span class="holo-id">PRJ-${num}</span>
                        <span class="detail-title-sm">${p.title}</span>
                    </div>
                    <button class="detail-close" onclick="closeProject()" aria-label="Close"><i class="fas fa-times"></i></button>
                </div>
                <div class="detail-hero">
                    <img src="${p.image}" alt="${p.title}" onerror="this.src='assets/images/background.png'">
                    <div class="hud-corner hud-tl"></div>
                    <div class="hud-corner hud-tr"></div>
                    <div class="hud-corner hud-bl"></div>
                    <div class="hud-corner hud-br"></div>
                </div>
                <div class="detail-meta-bar">
                    <span class="badge badge-primary">${p.category}</span>
                    <span class="badge badge-${p.status === 'completed' ? 'success' : 'warning'}">${s.label}</span>
                    <span class="badge badge-outline">${this.fmtDate(p.date)}</span>
                    ${techs}
                </div>
                <div class="detail-body">${content}</div>
                <div class="detail-footer">
                    <div class="detail-nav">
                        ${prev ? `<button onclick="openProject('${prev.id}')"><i class="fas fa-chevron-left"></i> Prev</button>` : ''}
                        ${next ? `<button onclick="openProject('${next.id}')">Next <i class="fas fa-chevron-right"></i></button>` : ''}
                    </div>
                    <div style="display:flex;gap:6px;flex-wrap:wrap">
                        ${linkBtns}
                        <button class="btn btn-primary btn-sm" onclick="closeProject()"><i class="fas fa-times"></i> Close</button>
                    </div>
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }

    search(t) {
        const s = t.toLowerCase().trim();
        this.filtered = s ? this.data.projects.filter(p =>
            p.title.toLowerCase().includes(s) || p.excerpt.toLowerCase().includes(s) ||
            p.tags.some(t => t.toLowerCase().includes(s)) || p.technologies.some(t => t.toLowerCase().includes(s))
        ) : [...this.data.projects];
        this.renderAll();
    }

    filterCat(c) { this.filtered = c ? this.data.projects.filter(p => p.category === c) : [...this.data.projects]; this.renderAll(); }
    filterStatus(s) { this.filtered = s ? this.data.projects.filter(p => p.status === s) : [...this.data.projects]; this.renderAll(); }
    fmtDate(d) { return new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short' }); }
}

function openProject(id) {
    const overlay = document.getElementById('detail-overlay');
    document.querySelectorAll('.detail-panel').forEach(d => d.classList.remove('open'));
    const el = document.getElementById(id + '-detail');
    if (el) {
        el.classList.add('open');
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
        el.querySelector('.detail-body')?.scrollTo(0, 0);
    }
}

function closeProject() {
    document.querySelectorAll('.detail-panel').forEach(d => d.classList.remove('open'));
    const overlay = document.getElementById('detail-overlay');
    if (overlay) overlay.classList.remove('open');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeProject(); });
document.addEventListener('DOMContentLoaded', () => new ProjectsManager());
</script>
</body>
</html>
